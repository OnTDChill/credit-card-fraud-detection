name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend regression tests
        run: python manage.py test core --verbosity 2

      - name: Run production smoke gate
        run: python manage.py test core.test_streamlit_smoke core.tests.FraudEndToEndLifecycleTests --verbosity 2
